<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Designer</title>
<link rel="stylesheet" href="../../css/style.css" />
<style>
/* ─── reset ─── */
html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
body {
  background: #000;
  color: #ccc;
  font-family: "MonaspaceKrypton", monospace;
  font-size: 12px;
  display: flex;
}

/* ─── header bar ─── */
.header-bar {
  position: fixed;
  top: 0; left: 0; right: 340px;
  height: 32px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  background: rgba(0,0,0,0.85);
  z-index: 10;
  border-bottom: 1px solid #222;
}
.header-bar h1 {
  color: #00e5ff;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 0;
}
#langToggle {
  margin-left: auto;
  background: #222;
  border: 1px solid #555;
  color: #aaa;
  padding: 1px 12px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
}
#langToggle:hover { border-color: #00e5ff; color: #fff; }

/* ─── vis mode tabs ─── */
.vis-tabs {
  display: flex;
  gap: 0;
}
.vis-tab {
  background: #111;
  border: 1px solid #333;
  color: #666;
  padding: 2px 14px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.12s;
}
.vis-tab:first-child { border-radius: 3px 0 0 3px; }
.vis-tab:last-child { border-radius: 0 3px 3px 0; }
.vis-tab.active {
  background: #00333a;
  border-color: #00e5ff;
  color: #00e5ff;
}
.vis-tab:hover:not(.active) { border-color: #555; color: #999; }

/* ─── main area ─── */
.main-area {
  flex: 1;
  margin-top: 32px;
  margin-right: 340px;
  position: relative;
  background: #050505;
  overflow: hidden;
}
#visCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ─── sidebar ─── */
.sidebar {
  position: fixed;
  top: 0; right: 0;
  width: 340px;
  height: 100%;
  background: #0d0d0d;
  border-left: 1px solid #222;
  overflow-y: auto;
  padding: 10px 12px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* ─── control rows ─── */
.row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.row label {
  width: 60px;
  flex-shrink: 0;
  color: #777;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.row input[type="range"] {
  flex: 1;
  height: 3px;
  -webkit-appearance: none;
  background: #333;
  border-radius: 2px;
  outline: none;
}
.row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #00e5ff;
  cursor: pointer;
}
.row input[type="range"]::-moz-range-thumb {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #00e5ff;
  cursor: pointer;
  border: none;
}
.row .num-input {
  width: 48px;
  background: #1a1a1a;
  border: 1px solid #444;
  color: #fff;
  padding: 1px 4px;
  font-family: inherit;
  font-size: 11px;
  text-align: right;
  outline: none;
}
.row .num-input:focus { border-color: #00e5ff; }
.row .arrow-group {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.row .arrow-group button {
  background: #222;
  border: 1px solid #444;
  color: #777;
  width: 16px; height: 10px;
  font-size: 7px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.row .arrow-group button:hover { background: #333; color: #fff; }
.row .arrow-group button:active { background: #00e5ff; color: #000; }
.row .unit {
  color: #555;
  font-size: 10px;
  width: 22px;
  flex-shrink: 0;
}
.row select {
  flex: 1;
  background: #1a1a1a;
  color: #fff;
  border: 1px solid #444;
  padding: 2px 6px;
  font-family: inherit;
  font-size: 11px;
  outline: none;
  cursor: pointer;
}
.row select:focus { border-color: #00e5ff; }

/* ─── toggles ─── */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}
.toggle {
  width: 28px; height: 16px;
  background: #333;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  position: relative;
  flex-shrink: 0;
}
.toggle.on { background: #00e5ff; }
.toggle::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(12px); }

/* ─── echo sub ─── */
.echo-sub { display: none; margin-top: 2px; }
.echo-sub.open { display: block; }
.echo-sub .row { margin-bottom: 4px; }
.echo-sub .row label { width: 52px; font-size: 9px; }

/* ─── actions ─── */
.actions {
  display: flex;
  gap: 6px;
  margin: 8px 0;
}
.btn {
  padding: 4px 12px;
  border: 1px solid #444;
  background: #222;
  color: #fff;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.12s;
}
.btn:hover { border-color: #00e5ff; background: #1a2a2a; }
.btn.primary { border-color: #00e5ff; background: #00333a; }
.btn.primary:hover { background: #004d55; }
.btn.danger { border-color: #ff1744; }
.btn.danger:hover { background: #2a111a; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ─── code box ─── */
.code-box {
  background: #0a0a0a;
  border: 1px solid #333;
  padding: 8px 10px;
  margin: 6px 0;
  font-size: 11px;
  color: #4caf50;
  min-height: 28px;
  white-space: pre-wrap;
  word-break: break-all;
  position: relative;
}

/* ─── bank ─── */
.section-title {
  color: #555;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 8px 0 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.bank-list {
  max-height: 160px;
  overflow-y: auto;
}
.bank-list::-webkit-scrollbar { width: 3px; }
.bank-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.bank-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  border-bottom: 1px solid #1a1a1a;
  font-size: 10px;
}
.bank-item:last-child { border-bottom: none; }
.bank-item .call {
  color: #4caf50;
  flex: 1;
  word-break: break-all;
  margin-right: 6px;
  font-size: 10px;
  line-height: 1.3;
}
.bank-item .ba { display: flex; gap: 3px; flex-shrink: 0; }
.bank-item .ba button {
  background: none;
  border: 1px solid #333;
  color: #666;
  padding: 1px 6px;
  font-size: 9px;
  cursor: pointer;
  font-family: inherit;
}
.bank-item .ba button:hover { border-color: #00e5ff; color: #fff; }
.bank-item .ba .play-bn:hover { border-color: #4caf50; color: #4caf50; }
.bank-item .ba .del-bn:hover { border-color: #ff1744; color: #ff1744; }

/* ─── loop status bar ─── */
.loop-status {
  font-size: 10px;
  margin: 4px 0;
}
.loop-status.on { color: #4caf50; }
.loop-status.off { color: #555; }

/* ─── empty bank ─── */
.empty-bank { color: #444; font-size: 10px; padding: 4px 0; }
</style>
</head>
<body>

<!-- header -->
<div class="header-bar">
  <h1 data-i18n="title">Sound Designer</h1>
  <div class="vis-tabs">
    <button class="vis-tab active" data-mode="osc" data-i18n="oscilloscope">Oscilloscope</button>
    <button class="vis-tab" data-mode="spec" data-i18n="spectrum">Spectrum</button>
  </div>
  <button id="langToggle">RU</button>
</div>

<!-- main visualization -->
<div class="main-area">
  <canvas id="visCanvas"></canvas>
</div>

<!-- sidebar -->
<div class="sidebar">
  <div class="row">
    <label data-i18n="waveform">Waveform</label>
    <select id="waveform">
      <option value="sine">sine</option>
      <option value="square" selected>square</option>
      <option value="sawtooth">sawtooth</option>
      <option value="triangle">triangle</option>
    </select>
  </div>

  <div class="row">
    <label data-i18n="frequency">Freq</label>
    <input type="range" id="freq" min="20" max="3000" value="440" step="1">
    <input type="text" class="num-input" id="freqNum" value="440">
    <div class="arrow-group">
      <button class="up" data-target="freq">&#9650;</button>
      <button class="dn" data-target="freq">&#9660;</button>
    </div>
    <span class="unit" data-i18n="Hz">Hz</span>
  </div>

  <div class="row">
    <label data-i18n="duration">Dur</label>
    <input type="range" id="duration" min="10" max="2000" value="100" step="5">
    <input type="text" class="num-input" id="durNum" value="0.10">
    <div class="arrow-group">
      <button class="up" data-target="duration">&#9650;</button>
      <button class="dn" data-target="duration">&#9660;</button>
    </div>
    <span class="unit" data-i18n="s">s</span>
  </div>

  <div class="row">
    <label data-i18n="volume">Vol</label>
    <input type="range" id="volume" min="0" max="100" value="3" step="1">
    <input type="text" class="num-input" id="volNum" value="0.003">
    <div class="arrow-group">
      <button class="up" data-target="volume">&#9650;</button>
      <button class="dn" data-target="volume">&#9660;</button>
    </div>
    <span class="unit">—</span>
  </div>

  <div class="row">
    <label data-i18n="pitchVar">PitchV</label>
    <input type="range" id="pitchVar" min="0" max="50" value="0" step="1">
    <input type="text" class="num-input" id="pvNum" value="0.00">
    <div class="arrow-group">
      <button class="up" data-target="pitchVar">&#9650;</button>
      <button class="dn" data-target="pitchVar">&#9660;</button>
    </div>
    <span class="unit">±</span>
  </div>

  <div class="row">
    <label data-i18n="echo">Echo</label>
    <div class="toggle-wrap">
      <div class="toggle" id="echoToggle"></div>
      <span id="echoStatus" style="color:#555;font-size:10px">off</span>
    </div>
  </div>

  <div class="echo-sub" id="echoSub">
    <div class="row">
      <label data-i18n="echoDelay">Delay</label>
      <input type="range" id="echoDelay" min="20" max="300" value="65" step="5">
      <input type="text" class="num-input" id="edNum" value="65">
      <div class="arrow-group">
        <button class="up" data-target="echoDelay">&#9650;</button>
        <button class="dn" data-target="echoDelay">&#9660;</button>
      </div>
      <span class="unit" data-i18n="ms">ms</span>
    </div>
    <div class="row">
      <label data-i18n="echoVol">EchoV</label>
      <input type="range" id="echoVol" min="0" max="50" value="12" step="1">
      <input type="text" class="num-input" id="evNum" value="0.012">
      <div class="arrow-group">
        <button class="up" data-target="echoVol">&#9650;</button>
        <button class="dn" data-target="echoVol">&#9660;</button>
      </div>
      <span class="unit">—</span>
    </div>
  </div>

  <div class="row">
    <label data-i18n="loopMode">Loop</label>
    <div class="toggle-wrap">
      <div class="toggle" id="loopToggle"></div>
      <span id="loopStatus" class="loop-status off" data-i18n="off">off</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn primary" id="playBtn" data-i18n="play">Play</button>
    <button class="btn" id="addBtn" data-i18n="addToBank">+Bank</button>
  </div>

  <div class="code-box" id="codeOut">playSound(440, "square", 0.1, 0.003)</div>

  <div class="section-title">
    <span data-i18n="soundBank">Sound Bank</span>
    <span style="display:flex;gap:4px">
      <button class="btn" id="exportBtn" data-i18n="exportAll" style="font-size:9px;padding:1px 8px">Export</button>
      <button class="btn danger" id="clearBtn" data-i18n="clear" style="font-size:9px;padding:1px 8px">Clear</button>
    </span>
  </div>
  <div class="bank-list" id="bankList">
    <div class="empty-bank" data-i18n="noSounds">No sounds yet</div>
  </div>
</div>

<script src="localization.js"></script>
<script src="main.js"></script>
</body>
</html>
